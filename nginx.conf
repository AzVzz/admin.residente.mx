map $http_user_agent $b2c_share_bot {
    default 0;
    ~*(WhatsApp|facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Slackbot|Discordbot|TelegramBot) 1;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Compresión gzip para HTML/JS/CSS (texto)
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Assets hasheados (chunks JS/CSS bundleados por Vite): cache 1 año immutable.
    # Vite incluye hash en el nombre (ej: index-BckMYKu4.js), por lo que cambia
    # con cada deploy y nunca sirve versión vieja al mismo nombre.
    location ~* ^/admin/.+\.[a-zA-Z0-9_-]+\.(js|css|woff2?|svg|png|jpg|jpeg|webp|avif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # index.html del SPA: TTL corto + SWR para deploys rápidos pero cacheable.
    location = /admin/index.html {
        add_header Cache-Control "public, max-age=300, s-maxage=600, stale-while-revalidate=3600" always;
        try_files $uri =404;
    }

    # WhatsApp / redes: HTML estático con og:image para /admin/B2C
    location = /admin/B2C {
        if ($b2c_share_bot = 1) {
            rewrite ^ /admin/b2c-og.html last;
        }
        try_files /admin/index.html =404;
    }

    location = /admin/B2C/ {
        if ($b2c_share_bot = 1) {
            rewrite ^ /admin/b2c-og.html last;
        }
        try_files /admin/index.html =404;
    }

    # SPA fallback para /admin/
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Fallback raiz - redirige todo a /admin/
    location / {
        try_files $uri $uri/ /admin/index.html;
    }

    # En produccion, Plesk maneja el proxy a /api/ y /fotos/
    # En Docker local, el proxy se configura en docker-compose
}
